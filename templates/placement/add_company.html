{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="card" style="width: 100%; max-width: 600px;">
        <h2>Add New Company</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Post a new placement opportunity</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="name" required>
            </div>
            
            <div class="form-group">
                <label>Description (Details, Roles, Package)</label>
                <textarea name="description" rows="4" required></textarea>
            </div>
            
            <div class="form-group">
                <label>External Application Link (Optional)</label>
                <input type="url" name="application_link">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Minimum CGPA Required</label>
                    <input type="number" name="min_cgpa" step="0.01" min="0" max="10" value="0.00" required>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label>Maximum Active Backlogs Allowed</label>
                    <input type="number" name="max_backlogs" min="0" value="0" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Post Opportunity</button>
        </form>
    </div>
</div>
{% endblock %}
