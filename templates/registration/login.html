{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to access your dashboard</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <small style="color: var(--danger);">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
